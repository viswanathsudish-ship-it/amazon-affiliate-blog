title: "Fitness Gear Reviews 2026"
description: "Honest reviews and buying guides for fitness gear, smart home, kitchen gadgets, and tech accessories."
baseurl: "/amazon-affiliate-blog"
url: "https://viswanathsudish-ship-it.github.io"
author: "Fitness Gear Guru"
email: "viswanathsudish@gmail.com"

theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
