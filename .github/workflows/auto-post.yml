name: Auto-generate blog post

on:
  schedule:
    - cron: '0 8 * * 1,3,5'   # Mon/Wed/Fri at 8am UTC
  workflow_dispatch:        # Lets you trigger manually from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install google-generativeai

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_TAG: fitnessguru23-21
        run: python scripts/generate_post.py

      - name: Commit and push
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@noreply.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "Auto post: $(date +%Y-%m-%d)"
          git push
